name: Deploy su Aruba via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Installa lftp
        run: sudo apt-get install -y lftp

      - name: Mostra cartelle FTP disponibili
        run: |
          lftp -e "set ssl:verify-certificate no; set ftp:passive-mode on; open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ftp.autoscuolasanbiagio.com; ls; bye" 2>&1

      - name: Upload index.html su Aruba
        run: |
          lftp -e "
            set ssl:verify-certificate no;
            set ftp:passive-mode on;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ftp.autoscuolasanbiagio.com;
            put -O ./ index.html;
            bye
          " 2>&1
